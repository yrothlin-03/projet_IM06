experiment:
  name: "condition_a_unet"
  condition: "A"
  seed: 42

data:
  data_root:    "/home/infres/yrothlin-24/arcade_challenge_datasets"
  train_images: "dataset_phase_1/segmentation_dataset/seg_train/images"
  train_ann:    "dataset_phase_1/segmentation_dataset/seg_train/annotations/seg_train.json"
  val_images:   "dataset_final_phase/test_case_segmentation/images"
  val_ann:      "dataset_final_phase/test_case_segmentation/annotations/instances_default.json"
  train_ratio:  0.8
  num_classes:  26
  img_size:     512
  num_workers:  4
  pin_memory:   true

model:
  architecture:    "unet"
  encoder_name:    "resnet34"
  encoder_weights: "imagenet"
  in_channels:     1
  num_classes:     26

training:
  epochs:                   2
  batch_size:               8
  learning_rate:            1.0e-4
  weight_decay:             1.0e-4
  early_stopping_patience:  15
  grad_clip:                1.0

scheduler:
  name: "cosine"
  cosine:
    T_max:   100
    eta_min: 1.0e-6
  plateau:
    factor:   0.5
    patience: 7
    min_lr:   1.0e-6

loss:
  dice_weight: 0.5
  ce_weight:   0.5

logging:
  save_dir: "./checkpoints"   # dossier pour best_model.pth, history.json, test_results.json
