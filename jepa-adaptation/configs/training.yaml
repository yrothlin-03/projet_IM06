data:
  loader:
    batch_size: 4
    num_workers: 0
    pin_memory: true

  train:
    data_dir: arcade_challenge_datasets/dataset_phase_1/stenosis_dataset/sten_train
    shuffle: true
    drop_last: true
    num_classes: 26

  valid:
    data_dir: arcade_challenge_datasets/dataset_phase_1/stenosis_dataset/sten_val
    shuffle: false
    drop_last: false
    num_classes: 26

training:
  seed: 42
  device: auto
  epochs: 50
  amp: true
  max_grad_norm: 1.0
  log_every: 20
  save_every: 5
  output_dir: jepa-adaptation/outputs/jepa

  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
