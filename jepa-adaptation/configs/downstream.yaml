medvae:
  ckpt_path: medvae_checkpoints/vae_4x_3c_2D.ckpt
  embed_dim: 3
  apply_channel_ds: false
  state_dict: true
  ddconfig:
    double_z: true
    z_channels: 3
    resolution: 512
    in_channels: 3
    out_ch: 3
    ch: 128
    ch_mult: [1, 2, 4]
    num_res_blocks: 2
    attn_resolutions: []
    dropout: 0.0

jepa:
  ckpt_path: outputs/jepa/best.pt
  model_config: configs/model.yaml

downstream:
  num_classes: 26
  image_size: 256
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 4
  num_workers: 0
  device: auto
  log_every: 20
  output_dir: outputs/downstream
  bg_weight: 0.1
  dice_weight: 0.5
  decoder_stages: 4
